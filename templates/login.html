<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#3182ce">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    
    <title>TWG Warehouse</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <style>
        body { background-color: #f0f2f5; font-family: sans-serif; }
        .login-container { 
            max-width: 350px; margin: 40px auto; padding: 20px; 
            background: white; border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        .btn-login { 
            width: 100%; padding: 15px; font-size: 18px; 
            background: #007bff; color: white; border: none; 
            border-radius: 5px; cursor: pointer; 
        }
        .alert { padding: 10px; margin-bottom: 15px; border-radius: 5px; }
        .alert-error { background: #ffebee; color: #c62828; }
        
        /* Fullscreen Helper */
        #fs-btn {
            position: fixed; bottom: 10px; right: 10px; opacity: 0.3;
            background: #000; color: #fff; border: none; padding: 5px; font-size: 10px;
        }
    </style>
</head>
<body>
    <button id="fs-btn" onclick="forceFullscreen()">⛶</button>

    <div class="login-container">
        <h2 style="text-align: center; color: #333;">🏭 TWG Scanner</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>User ID</label>
                <input type="text" name="userid" id="userInput" class="scan-input" 
                       placeholder="Scan Badge..." 
                       autofocus required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="scan-input" placeholder="Enter Password" required>
            </div>

            <button type="submit" class="btn-login">LOGIN</button>
        </form>
        <div style="text-align:center; font-size:11px; color:#aaa; margin-top:20px;">
            v1.3 - Tap screen to Fullscreen
        </div>
    </div>

    <script>
        // --- UNIVERSAL FULLSCREEN TRIGGER ---
        function forceFullscreen() {
            const doc = window.document;
            const docEl = doc.documentElement;
            const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            if(!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                if(requestFullScreen) requestFullScreen.call(docEl).catch(e=>{});
            }
        }
        // Attempt on any touch/click
        document.addEventListener('click', forceFullscreen, {once:true});
        document.addEventListener('touchstart', forceFullscreen, {once:true});
        
        // Initial Focus Logic
        document.addEventListener('DOMContentLoaded', () => {
            const userInput = document.getElementById('userInput');
            if(userInput) {
                setTimeout(() => userInput.focus(), 500);
                userInput.addEventListener('click', function() {
                    if (this.inputMode === 'none') {
                        this.inputMode = 'text'; this.blur(); setTimeout(() => this.focus(), 50); 
                    }
                });
            }
        });
    </script>
</body>
</html>
