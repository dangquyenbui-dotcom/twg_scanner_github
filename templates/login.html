<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2d3748">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    
    <title>TWG Warehouse</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <style>
        body { background-color: #f0f2f5; font-family: sans-serif; }
        .login-container { 
            max-width: 350px; margin: 40px auto; padding: 20px; 
            background: white; border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        .btn-login { 
            width: 100%; padding: 15px; font-size: 18px; 
            background: #007bff; color: white; border: none; 
            border-radius: 5px; cursor: pointer; 
        }
        .alert { padding: 10px; margin-bottom: 15px; border-radius: 5px; }
        .alert-error { background: #ffebee; color: #c62828; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2 style="text-align: center; color: #333;">🏭 TWG Scanner</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>User ID</label>
                <input type="text" name="userid" id="userInput" class="scan-input" 
                       placeholder="Enter ID" 
                       autofocus required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="scan-input" placeholder="Enter Password" required>
            </div>

            <button type="submit" class="btn-login">LOGIN</button>
        </form>
        <div style="text-align:center; font-size:11px; color:#aaa; margin-top:20px;">
            v1.7 - Full Screen Mode
        </div>
    </div>

    <!-- Fullscreen management is handled by utils.js -->
    <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
    
    <script>
        // Initial Focus Logic
        document.addEventListener('DOMContentLoaded', function() {
            var userInput = document.getElementById('userInput');
            if(userInput) {
                setTimeout(function() { userInput.focus(); }, 500);
                userInput.addEventListener('click', function() {
                    if (this.inputMode === 'none') {
                        this.inputMode = 'text'; this.blur(); 
                        var self = this;
                        setTimeout(function() { self.focus(); }, 50); 
                    }
                });
            }
        });
    </script>
</body>
</html>
