<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TWG Menu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container" style="max-width: 600px; margin-top: 20px;">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 style="margin:0; font-weight:800; color:#2d3748;">TWG WMS</h3>
                <small style="color:#718096; font-size:14px;">User: <b>{{ session['user_id'] }}</b> ({{ session['location'] }})</small>
            </div>
            <a href="/logout" class="btn-logout"><i class="fas fa-sign-out-alt"></i></a>
        </div>

        <hr style="border-top: 1px solid #e2e8f0; margin-bottom: 25px;">

        <div class="app-grid">
            
            <a href="/picking" class="app-icon-card">
                <div class="icon-circle bg-blue">
                    <i class="fas fa-dolly-flatbed"></i>
                </div>
                <span class="app-label">Order Pick</span>
            </a>

            <a href="#" class="app-icon-card disabled">
                <div class="icon-circle bg-gray">
                    <i class="fas fa-clipboard-list"></i>
                </div>
                <span class="app-label">Inventory</span>
            </a>

            <a href="#" class="app-icon-card disabled">
                <div class="icon-circle bg-gray">
                    <i class="fas fa-exchange-alt"></i>
                </div>
                <span class="app-label">Bin Move</span>
            </a>

            <a href="#" class="app-icon-card disabled">
                <div class="icon-circle bg-gray">
                    <i class="fas fa-truck-loading"></i>
                </div>
                <span class="app-label">Receiving</span>
            </a>

        </div>
    </div>
</body>
</html>
