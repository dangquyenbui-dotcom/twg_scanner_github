<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWG Menu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container" style="max-width: 600px; margin-top: 15px;">
        <div class="d-flex justify-content-between align-items-start mb-3">
            <div>
                <h3 style="margin:0; font-weight:800; color:#2d3748; font-size: 1.6rem;">TWG WMS</h3>
                <div style="color:#718096; font-size:14px; margin-top: 5px;">
                    User: <b>{{ session['user_id'] }}</b> ({{ session['location'] }})<br>
                    <i class="far fa-calendar-alt"></i> {{ date }} | <i class="far fa-clock"></i> {{ time }}
                </div>
            </div>
            <a href="/logout" class="btn-logout" style="padding: 12px 18px;"><i class="fas fa-sign-out-alt fa-lg"></i></a>
        </div>

        <hr style="border-top: 1px solid #e2e8f0; margin-bottom: 25px;">

        <div class="app-grid-single">
            <a href="/picking" class="app-icon-card-large">
                <div class="icon-circle-large bg-blue">
                    <i class="fas fa-dolly-flatbed"></i>
                </div>
                <span class="app-label-large">Order Pick</span>
            </a>
        </div>
    </div>
</body>
</html>
